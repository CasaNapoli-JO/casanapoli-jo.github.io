<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Napoli | Neapolitan Pizza Jordan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f0f0f;
color:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#000;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:#e63946;
font-weight:700;
font-size:20px;
}

/* HERO */
.hero{
height:50vh;
background:url("https://images.unsplash.com/photo-1601924582975-7e7c4b7a8c6d") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
}

/* SECTION */
.section{
padding:30px 15px;
max-width:1100px;
margin:auto;
}

h2{text-align:center;margin-bottom:15px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:#1b1b1b;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.price{
color:#e63946;
font-weight:700;
}

button{
width:100%;
padding:10px;
border:none;
cursor:pointer;
border-radius:8px;
font-weight:600;
}

.add{
background:#e63946;
color:white;
}

/* CART BUTTON */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#000;
padding:12px 16px;
border-radius:50px;
cursor:pointer;
}

/* CART PANEL */
.panel{
position:fixed;
right:-420px;
top:0;
width:330px;
height:100%;
background:#000;
padding:15px;
transition:0.3s;
overflow:auto;
z-index:99;
}

.panel.open{right:0}

.close{
background:#e63946;
color:#fff;
border:none;
padding:8px;
width:100%;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
}

/* ITEMS */
.item{
display:flex;
justify-content:space-between;
margin:8px 0;
font-size:14px;
}

/* PAYMENT */
.paybox{
background:#111;
padding:12px;
margin-top:10px;
border-radius:10px;
}

.cliq{
background:#ff7a00;
color:white;
margin-top:5px;
}

.whatsapp{
background:#25D366;
color:#fff;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#000;
font-size:12px;
margin-top:30px;
}

</style>
</head>

<body>

<header>
<div class="logo">Casa Napoli</div>
</header>

<div class="hero">
<h1>Authentic Neapolitan Pizza 🍕 Jordan</h1>
</div>

<!-- MENU -->
<section class="section">
<h2>Pizza (25cm)</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1548365328-8b849e6c1d7b">
<div class="card-content">
<h3>Italian Classic</h3>
<p class="price">3.250 JD</p>
<button class="add" onclick="add('Italian Classic',3.250)">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
<div class="card-content">
<h3>Pepperoni</h3>
<p class="price">3.750 JD</p>
<button class="add" onclick="add('Pepperoni',3.750)">Add</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1604382354936-07c5d9983bd3">
<div class="card-content">
<h3>BBQ Chicken</h3>
<p class="price">3.950 JD</p>
<button class="add" onclick="add('BBQ Chicken',3.950)">Add</button>
</div>
</div>

</div>
</section>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<!-- CART PANEL -->
<div class="panel" id="cart">

<button class="close" onclick="closeCart()">✕ Close</button>

<h3>Your Order</h3>

<div id="items"></div>

<h3>Total: <span id="total">0.000</span> JD</h3>

<!-- PAYMENT -->
<div class="paybox">
<h4>CliQ Payment</h4>
<p>Send to: <b>962790050175</b></p>
<button class="cliq" onclick="paid()">I Have Paid</button>
</div>

<div class="paybox">
<h4>Cash on Delivery</h4>
</div>

<button class="whatsapp" onclick="sendOrder()">Send WhatsApp Order</button>

<a href="https://www.talabat.com/jordan/casanapoli"
style="display:block;margin-top:10px;text-align:center;background:#e63946;color:white;padding:10px;border-radius:8px;text-decoration:none;">
Order on Talabat
</a>

</div>

<footer>
© Casa Napoli - Jordan
</footer>

<script>

let cart = []
let total = 0
let paidStatus = false

function add(name, price){
cart.push({name, price})
total += price
updateCart()
}

function updateCart(){

document.getElementById("count").innerText = cart.length

let html = ""

cart.forEach(i=>{
html += `<div class="item"><span>${i.name}</span><span>${i.price.toFixed(3)} JD</span></div>`
})

document.getElementById("items").innerHTML = html
document.getElementById("total").innerText = total.toFixed(3)

}

function openCart(){
document.getElementById("cart").classList.add("open")
}

function closeCart(){
document.getElementById("cart").classList.remove("open")
}

function paid(){
paidStatus = true
alert("Payment marked as completed ✔")
}

function sendOrder(){

let msg = "New Order - Casa Napoli%0A%0AItems:%0A"

cart.forEach(i=>{
msg += i.name + " - " + i.price + " JD%0A"
})

msg += "%0ATotal: " + total.toFixed(3) + " JD%0A"
msg += "%0APayment: " + (paidStatus ? "CliQ Paid" : "Pending")

window.open("https://wa.me/962790050175?text=" + msg)

}

</script>

</body>
</html>
